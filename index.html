<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

</head>

<body>

<a-scene
mindar-image="imageTargetSrc: targets.mind;"
embedded
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
color-space="sRGB"
renderer="physicallyCorrectLights"
>

<a-assets>

<a-asset-item
id="cubeModel"
src="portfolio_scene.glb">
</a-asset-item>

</a-assets>


<a-camera
position="0 0 0"
look-controls="false">
</a-camera>


<a-entity mindar-image-target="targetIndex:0">

    <!-- Luce -->
    <a-light
        type="ambient"
        intensity="1">
    </a-light>

    <a-light
        type="directional"
        intensity="1"
        position="1 2 1">
    </a-light>

    <!-- Modello GLB -->
    <a-gltf-model
        src="#cubeModel"

        position="0 0 0"

        scale="0.5 0.5 0.5"

        rotation="0 0 0"

        animation="
            property: rotation;
            to: 0 360 0;
            loop: true;
            dur: 4000;
            easing: linear;
        "
    >
    </a-gltf-model>

</a-entity>

</a-scene>

</body>
</html>
